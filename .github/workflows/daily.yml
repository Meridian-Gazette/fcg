name: Daily Claude Update
on:
  schedule:
    - cron: '0 4 * * *' 
  workflow_dispatch:   # Umožní ti spustit proces ručně tlačítkem pro test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Důležité: umožní botovi zapsat nový soubor do repozitáře
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install anthropic
        
      - name: Run fetch script
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python fetch_claude.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Nový denní příspěvek od Claude" || exit 0
          git push
